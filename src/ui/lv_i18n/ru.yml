  about_terms_discontinuance_service_desc: Мы можем изменить или прекратить наши услуги.
    Пожалуйста, помните резервное копирование ваших фраз семян для доступа к вашей
    криптовалюте.
  about_terms_eligibility: Квалификация
  about_terms_eligibility_desc: Вы должны быть старше 18 лет, чтобы иметь доступ к
    нашим продуктам или услугам.
  about_terms_indemnity: Гарантии
  about_terms_indemnity_desc: Вы должны быть старше 18 лет, чтобы иметь доступ к нашим
    продуктам или услугам.
  about_terms_law: Применимое право и урегулирование споров
  about_terms_law_desc: Эта статья регулируется законодательством ОАРГ, и любые споры
    должны быть поданы в течение одного года.
  about_terms_modification: Изменения этих статей
  about_terms_modification_desc: Мы оставляем за собой право изменять эти положения
    по своему усмотрению.
  about_terms_no_sensitive_information: Отсутствие доступа к конфиденциальной информации
  about_terms_no_sensitive_information_desc: Мы не храним вашу конфиденциальную информацию,
    такую как пароли или семенные фразы. Убедитесь, что ваши документы в безопасности.
  about_terms_ownership: Право собственности и владения
  about_terms_ownership_desc: Вы несете ответственность за использование продуктов
    и услуг.
  about_terms_product_and_services: Продукты и услуги Keystone
  about_terms_product_and_services_desc: Наши аппаратные кошельки безопасно управляют
    криптовалютами.
  about_terms_prohibited_conduct: Запрещенные действия
  about_terms_prohibited_product_desc: Наши продукты и услуги защищены законодательством
    об интеллектуальной собственности.
  about_terms_risks: Риск
  about_terms_risks_desc: Обратите внимание на риски, связанные с криптовалютными
