    сумму.
  about_info_verify_firmware_step2: 'Нажмите кнопку #F5870A Проверка и# рядом с загрузкой
    прошивки.'
  about_info_verify_firmware_step3: 'Нажмите кнопку #F5870A Show Checksum# ниже и
